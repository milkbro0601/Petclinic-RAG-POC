spring.application.name=rag
server.port=8081

# NVIDIA NIM via OpenAI-compatible endpoint
spring.ai.openai.api-key=${NVIDIA_API_KEY}
spring.ai.openai.base-url=https://integrate.api.nvidia.com/v1

# Chat model (for the LLM answer-generation step later)
spring.ai.openai.chat.options.model=meta/llama-3.1-8b-instruct

# Embedding model (text + image)
spring.ai.openai.embedding.options.model=nvidia/llama-nemotron-embed-1b-v2

tesseract.datapath=/opt/homebrew/share/tessdata